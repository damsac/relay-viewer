name: "RelayViewer"
options:
  bundleIdPrefix: dev.damsac
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  "RelayViewer":
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    dependencies:
      - framework: "Frameworks/relay_viewer_ffi.xcframework"
        embed: false
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        ENABLE_TESTABILITY: YES
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: "RelayViewer"
        UILaunchScreen: {}
  "RelayViewerTests":
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: "RelayViewer"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/RelayViewer.app/RelayViewer"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: "RelayViewer"
  "RelayViewerUITests":
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: "RelayViewer"

schemes:
  RelayViewer:
    build:
      targets:
        RelayViewer: all
    test:
      targets:
        - name: RelayViewerTests
          randomExecutionOrder: true
        - name: RelayViewerUITests
          randomExecutionOrder: true
