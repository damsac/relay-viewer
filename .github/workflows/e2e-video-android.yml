name: E2E Video Android

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "android/**"
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  e2e-video-android:
    runs-on: ubuntu-latest
    env:
      FFI_CRATE: relay-viewer-ffi
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android (cross-compile + bindings)
        run: ./scripts/android-build --crate-name $FFI_CRATE

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Record app in emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -no-boot-anim -no-snapshot
          disable-animations: true
          working-directory: ${{ github.workspace }}
          script: ./scripts/android-e2e-record

      - name: Upload video to Blossom
        id: blossom
        if: always()
        run: |
          if [ ! -f recording.mp4 ]; then
            echo "::warning::No recording found"
            echo "url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          URL=$(cargo run -p blossom-upload -- \
            --server https://blossom.primal.net \
            --server https://blossom.oxtr.dev \
            recording.mp4 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            echo "::warning::Blossom upload failed, uploading as artifact instead"
            echo "url=" >> "$GITHUB_OUTPUT"
          else
            echo "url=$URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload video as artifact (fallback)
        if: always() && steps.blossom.outputs.url == ''
        uses: actions/upload-artifact@v4
        with:
          name: e2e-video-android
          path: recording.mp4
          retention-days: 5
          if-no-files-found: ignore

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.blossom.outputs.url }}';
            const runner = '${{ runner.os }} ${{ runner.arch }}';
            const sha = '${{ github.event.pull_request.head.sha }}';
            const shortSha = sha.substring(0, 7);

            let videoLine;
            if (url) {
              videoLine = `[Watch the recording](${url})`;
            } else {
              videoLine = '_Recording uploaded as workflow artifact (Blossom upload failed)_';
            }

            const body = [
              '## E2E Video — Android',
              '',
              videoLine,
              '',
              `Recorded on: ${runner}`,
              `Commit: ${shortSha}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
